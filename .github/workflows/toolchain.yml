name: Build & Release Toolchain

on:
  push:
    tags: ["toolchain-v*"]
  workflow_dispatch:

env:
  CTNG_VERSION: "1.28.0"
  TOOLCHAIN_PREFIX: "arm-rpi-linux-gnueabihf"

jobs:
  toolchain:
    name: Build Cross-Toolchain
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ct-ng deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc g++ gperf bison flex texinfo help2man make \
            libncurses-dev python3-dev autoconf automake \
            libtool-bin gawk wget bzip2 xz-utils unzip patch \
            rsync libstdc++6 file

      - name: Cache ct-ng binary
        id: cache-ctng-bin
        uses: actions/cache@v4
        with:
          path: ~/ct-ng-bin
          key: ctng-bin-${{ env.CTNG_VERSION }}

      - name: Fetch & build ct-ng
        if: steps.cache-ctng-bin.outputs.cache-hit != 'true'
        run: |
          wget --tries=3 --show-progress \
      http://crosstool-ng.org/download/crosstool-ng/crosstool-ng-${{ env.CTNG_VERSION }}.tar.xz
          tar xf crosstool-ng-${{ env.CTNG_VERSION }}.tar.xz
          cd crosstool-ng-${{ env.CTNG_VERSION }}
          ./configure --prefix=$HOME/ct-ng-bin
          make -j$(nproc)
          make install

      # Cache the finished toolchain keyed on the ct-ng config.
      # On a tag push this will almost always be a miss (intentional —
      # you're tagging because you changed something). But workflow_dispatch
      # re-runs benefit from it.
      - name: Toolchain cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/x-tools
          key: ctng-${{ env.CTNG_VERSION }}-${{ hashFiles('configs/crosstool-ng.config') }}

      - name: Build toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain-build
          cp configs/crosstool-ng.config toolchain-build/.config
          cd toolchain-build
          $HOME/ct-ng-bin/bin/ct-ng oldconfig
          $HOME/ct-ng-bin/bin/ct-ng build

      - name: Package toolchain
        run: |
          tar -cJf toolchain-${{ env.TOOLCHAIN_PREFIX }}-${{ github.ref_name }}.tar.xz \
            -C ~/x-tools \
            ${{ env.TOOLCHAIN_PREFIX }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Toolchain ${{ github.ref_name }}"
          body: |
            Cross-toolchain for `${{ env.TOOLCHAIN_PREFIX }}`.

            Built with crosstool-NG ${{ env.CTNG_VERSION }} from
            `configs/crosstool-ng.config` @ ${{ github.sha }}.

            **Target:** ARMv6 hard-float (arm1176jzf-s, VFPv2)
            **Host:** linux/arm64 (ubuntu-24.04-arm)
            **GCC:** 14.x
            **C library:** glibc (with locales)
            **Kernel headers:** 6.16.x

            ## Usage in Buildroot
            ```
            BR2_TOOLCHAIN_EXTERNAL=y
            BR2_TOOLCHAIN_EXTERNAL_PATH="/path/to/extracted/${{ env.TOOLCHAIN_PREFIX }}"
            BR2_TOOLCHAIN_EXTERNAL_PREFIX="${{ env.TOOLCHAIN_PREFIX }}"
            BR2_TOOLCHAIN_EXTERNAL_CUSTOM=y
            ```
          files: toolchain-${{ env.TOOLCHAIN_PREFIX }}-${{ github.ref_name }}.tar.xz
          fail_on_unmatched_files: true
