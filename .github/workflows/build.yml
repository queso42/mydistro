name: Buildroot m68k Macintosh Q800

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        # Updated key to separate your m68k compiler cache from your old ppc64le cache
        key: ${{ runner.os }}-buildroot-ccache-m68k-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-m68k-

    - name: Download and Extract Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.xz
        tar -xf buildroot-2026.02.tar.xz
        mv buildroot-2026.02 buildroot

    - name: Inject Custom Configuration Profile
      run: |
        # Injects your customized configuration file. 
        # Make sure your new configuration file is named 'm68k_q800_defconfig' inside your repo's configs/ folder!
        cp configs/m68k_q800_defconfig buildroot/.config

    - name: Configure Buildroot
      run: |
        cd buildroot
        # Explicitly map your dynamic runner home path into the .config
        sed -i 's|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR="$(HOME)/.buildroot-ccache"|' .config
        make olddefconfig

    - name: Compile the Distro
      run: |
        cd buildroot
        make

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/
        echo "--- Host / SDK Tools Mirror ---"
        ls -lh buildroot/output/host/

    - name: Upload Core OS Kernel and Ext4 Images
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-m68k-q800-images
        path: buildroot/output/images/*
        if-no-files-found: error

    - name: Upload Cross-Compiler Host SDK (Solution 1 Environment)
      uses: actions/upload-artifact@v4
      with:
        name: m68k-buildroot-sdk-host-tools
        # This grabs the toolchain, libraries, and your 'environment-setup' script
        path: buildroot/output/host/*
        if-no-files-found: error
