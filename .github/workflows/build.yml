name: Buildroot pSeries POWER9 ppc64le

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        key: ${{ runner.os }}-buildroot-ccache-ppc64le-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-ppc64le-

    - name: Download and Extract Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.xz
        tar -xf buildroot-2026.02.tar.xz
        mv buildroot-2026.02 buildroot

    - name: Inject Custom Configuration Profile
      run: |
        # Injects your customized configuration into the build tree root file position
        cp configs/ppc64le_defconfig buildroot/.config

    - name: Configure Buildroot
      run: |
        cd buildroot
        # Explicitly map your dynamic runner home path into the .config
        sed -i 's|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR="$(HOME)/.buildroot-ccache"|' .config
        make olddefconfig

    - name: Compile the Distro
      run: |
        cd buildroot
        make

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/

    - name: Upload Buildroot Images
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-pseries-power9-images
        path: buildroot/output/images/*
        if-no-files-found: error
