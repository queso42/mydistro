name: Make Distro using buildroot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        key: ${{ runner.os }}-buildroot-ccache-vexpress-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-vexpress-

    - name: Download and Extract Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.05-rc2.tar.xz
        tar -xf buildroot-2026.05-rc2.tar.xz
        mv buildroot-2026.05-rc2 buildroot

    - name: Put my stuff
      run: |
        cp configs/linux.config buildroot/board/qemu/arm-vexpress/linux.config
        cp configs/buildroot_defconfig buildroot/.config
        make -C buildroot/ olddefconfig

    - name: Compile the Distro
      run: make -C buildroot/

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/
        echo "--- Host / SDK Tools Mirror ---"
        ls -lh buildroot/output/host/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-images
        path: buildroot/output/images/*
        if-no-files-found: error

    - name: Upload cross-compiler
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-sdk-host-tools
        path: buildroot/output/host/*
        if-no-files-found: error
