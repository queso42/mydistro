name: Build Custom Distro (Buildroot)

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Buildroot arm-vexpress
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev libssl-dev \
            rsync cpio bc wget unzip findutils file \
            python3 git graphviz subversion

      - name: Fetch Buildroot
        run: |
          wget https://buildroot.org/downloads/buildroot-2026.05-rc2.tar.gz
          tar -xf buildroot-2026.05-rc2.tar.gz
          mv buildroot-2026.05-rc2 buildroot

      - name: Apply board config and defconfig
        run: |
          cp configs/linux.config \
            buildroot/board/qemu/arm-vexpress/linux.config
          cp configs/buildroot_defconfig buildroot/.config
          make -C buildroot/ olddefconfig

      - name: Build distro
        run: make -C buildroot/ -j$(nproc)

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: buildroot-images
          path: buildroot/output/images/*
          if-no-files-found: error
