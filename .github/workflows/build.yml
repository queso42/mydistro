name: Buildroot PowerPC Mac99 G4 Distro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        # Isolated cache space specifically for the PowerPC toolchain layers
        key: ${{ runner.os }}-buildroot-ccache-ppc99-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-ppc99-

    - name: Download and Extract Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.xz
        tar -xf buildroot-2026.02.tar.xz
        mv buildroot-2026.02 buildroot

    - name: Inject Custom Configuration Profile
      run: |
        # Injects your high-performance glibc/SysVinit config layer.
        # Make sure your uploaded file is saved in your repo as 'configs/mac99_g4_defconfig'!
        cp configs/mac99_g4_defconfig buildroot/.config

    - name: Configure Buildroot
      run: |
        cd buildroot
        # Explicitly map your dynamic runner home path into the .config
        sed -i 's|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR="$(HOME)/.buildroot-ccache"|' .config
        make olddefconfig

    - name: Compile the Distro
      run: |
        cd buildroot
        make

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/
        echo "--- Host / SDK Tools Mirror ---"
        ls -lh buildroot/output/host/

    - name: Upload Core OS Kernel (vmlinux) and Ext4 Images
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-ppc-mac99-images
        path: buildroot/output/images/*
        if-no-files-found: error

    - name: Upload Cross-Compiler Host SDK (PPC G4 Toolchain)
      uses: actions/upload-artifact@v4
      with:
        name: ppc-buildroot-sdk-host-tools
        path: buildroot/output/host/*
        if-no-files-found: error
