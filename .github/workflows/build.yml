name: Build Custom Distro (Buildroot)

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  BUILDROOT_VERSION: "2026.05-rc2"
  BUILDROOT_DIR: "buildroot"
  BOARD_DIR: "board/qemu/custom"

jobs:
  build:
    name: Compile Distro
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev libssl-dev \
            rsync cpio bc wget unzip findutils file \
            python3 git graphviz subversion \
            libgdk-pixbuf2.0-dev libxpm-dev \
            gdk-pixbuf-loader-xpm

      - name: Cache Buildroot tarball
        id: cache-br-tarball
        uses: actions/cache@v4
        with:
          path: buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
          key: buildroot-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Fetch Buildroot
        if: steps.cache-br-tarball.outputs.cache-hit != 'true'
        run: |
          wget -q --show-progress \
            https://buildroot.org/downloads/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz

      - name: Extract Buildroot
        run: |
          tar -xf buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
          mv buildroot-${{ env.BUILDROOT_VERSION }} ${{ env.BUILDROOT_DIR }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: buildroot-ccache-${{ github.sha }}
          restore-keys: buildroot-ccache-

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/buildroot_defconfig') }}
          restore-keys: buildroot-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Apply config
        run: |
          mkdir -p ${{ env.BUILDROOT_DIR }}/${{ env.BOARD_DIR }}
          cp configs/linux.config ${{ env.BUILDROOT_DIR }}/${{ env.BOARD_DIR }}/linux.config
          cp configs/buildroot_defconfig ${{ env.BUILDROOT_DIR }}/.config
          make -C ${{ env.BUILDROOT_DIR }} olddefconfig

      - name: Build distro
        run: |
          make -C ${{ env.BUILDROOT_DIR }} \
            BR2_CCACHE_DIR=~/.buildroot-ccache \
            BR2_DL_DIR=~/.buildroot-dl \
            -j$(nproc)

      - name: Verify output
        run: ls -lh ${{ env.BUILDROOT_DIR }}/output/images/

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: buildroot-images
          path: ${{ env.BUILDROOT_DIR }}/output/images/*
          if-no-files-found: error

  sdk:
    name: Build SDK
    runs-on: ubuntu-24.04-arm
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev libssl-dev \
            rsync cpio bc wget unzip findutils file \
            python3 git graphviz subversion

      - name: Cache Buildroot tarball
        id: cache-br-tarball
        uses: actions/cache@v4
        with:
          path: buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
          key: buildroot-tarball-${{ env.BUILDROOT_VERSION }}

      - name: Fetch Buildroot
        if: steps.cache-br-tarball.outputs.cache-hit != 'true'
        run: |
          wget -q --show-progress \
            https://buildroot.org/downloads/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz

      - name: Extract Buildroot
        run: |
          tar -xf buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
          mv buildroot-${{ env.BUILDROOT_VERSION }} ${{ env.BUILDROOT_DIR }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: buildroot-ccache-${{ github.sha }}
          restore-keys: buildroot-ccache-

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/buildroot_defconfig') }}
          restore-keys: buildroot-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Apply config
        run: |
          mkdir -p ${{ env.BUILDROOT_DIR }}/${{ env.BOARD_DIR }}
          cp configs/linux.config ${{ env.BUILDROOT_DIR }}/${{ env.BOARD_DIR }}/linux.config
          cp configs/buildroot_defconfig ${{ env.BUILDROOT_DIR }}/.config
          make -C ${{ env.BUILDROOT_DIR }} olddefconfig

      - name: Build SDK
        run: |
          make -C ${{ env.BUILDROOT_DIR }} \
            BR2_CCACHE_DIR=~/.buildroot-ccache \
            BR2_DL_DIR=~/.buildroot-dl \
            sdk -j$(nproc)

      - name: Upload SDK
        uses: actions/upload-artifact@v4
        with:
          name: buildroot-sdk
          path: ${{ env.BUILDROOT_DIR }}/output/images/*_sdk-buildroot.tar.gz
          if-no-files-found: error
