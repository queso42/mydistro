name: Buildroot mac99

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion configure-debian

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        key: ${{ runner.os }}-buildroot-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-

    - name: Download and Extract Buildroot
      run: |
        # Pulling down the latest 2026.02 LTS release
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.xz
        tar -xf buildroot-2026.02.tar.xz
        mv buildroot-2026.02 buildroot

    - name: Inject Custom ppc_defconfig
      run: |
        # Copies your specific config right into the Buildroot config tree
        cp configs/ppc_defconfig buildroot/configs/

    - name: Configure Buildroot
      run: |
        cd buildroot
        # Apply your custom configuration
        make ppc_defconfig
        
        # Ensure Buildroot points its internal cache to our GitHub Actions runner home directory
        # (This guarantees the cache persists across separate workflow pushes!)
        sed -i 's|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR="$(HOME)/.buildroot-ccache"|' .config
        
        make olddefconfig

    - name: Compile the Distro
      run: |
        cd buildroot
        # Start compilation. Buildroot auto-detects host CPU cores for parallel building.
        make

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/

    - name: Upload Linux Kernel & RootFS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: powerpc-musl-distro
        path: |
          buildroot/output/images/vmlinux
          buildroot/output/images/rootfs.ext2

