name: Buildroot versatilepb armel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libncurses5-dev rsync cpio python3 \
          unzip bc wget findutils file libssl-dev git \
          graphviz subversion configure-debian

    - name: Set up Persistent ccache Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildroot-ccache
        # Appended -armel to the key structure so GitHub isolates this cache from old PPC builds
        key: ${{ runner.os }}-buildroot-ccache-armel-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildroot-ccache-armel-

    - name: Download and Extract Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.xz
        tar -xf buildroot-2026.02.tar.xz
        mv buildroot-2026.02 buildroot

    - name: Inject Custom armel_defconfig
      run: |
        # Looks for your new armel configuration profile
        cp configs/armel_defconfig buildroot/configs/

    - name: Configure Buildroot
      run: |
        cd buildroot
        # Apply your custom ARM configuration profile
        make armel_defconfig

        # Explicitly maps your dynamic runner home path into the .config
        sed -i 's|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR="$(HOME)/.buildroot-ccache"|' .config
        
        make olddefconfig

    - name: Compile the Distro
      run: |
        cd buildroot
        make

    - name: Verify Output Files
      run: |
        ls -lh buildroot/output/images/

    - name: Upload Linux Kernel & RootFS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: armel-le-distro
        path: |
          buildroot/output/images/zImage
          buildroot/output/images/versatile-pb.dtb
          buildroot/output/images/rootfs.ext2
